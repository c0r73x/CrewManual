name: Build PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv pip install reportlab

      - name: Build PDF
        run: uv run build_pdf.py

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: crew-manual
          path: crew_manual.pdf
