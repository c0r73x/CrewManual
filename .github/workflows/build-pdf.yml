name: Build PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-liberation fonts-dejavu-core
          # Map Ubuntu font paths to the script's expected paths
          sudo mkdir -p /usr/share/fonts/liberation-fonts /usr/share/fonts/dejavu
          sudo ln -s /usr/share/fonts/truetype/liberation/* /usr/share/fonts/liberation-fonts/
          sudo ln -s /usr/share/fonts/truetype/dejavu/* /usr/share/fonts/dejavu/

      - name: Build PDF
        run: uv run --with reportlab build_pdf.py

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: crew-manual
          path: crew_manual.pdf

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: "Automated build of the Crew Manual from the latest main branch update."
          files: crew_manual.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
